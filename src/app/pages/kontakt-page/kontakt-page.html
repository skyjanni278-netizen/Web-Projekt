    <main id="main-content">
        <article class="artikel">
            <header>
                <h1>Kontakt</h1>
                <div class="artikel-meta">So erreichst du uns</div>
            </header>
            <section>
                <h2 class="visually-hidden">Kontaktinformationen</h2>
                <div class="contact-grid">
                    <div class="contact-info">
                        <h3>Vereinsbüro</h3>
                        <p>SV Ente Heidenheim<br>
                        Marienstraße 20 <br>
                        89518 Heidenheim an der Brenz</p>

                        <p><strong>Telefon:</strong> +49 123 456789<br>
                        <strong>Email:</strong> <a href="mailto:info@sv-ente.de">info@sv-ente.de</a></p>

                        <h4>Öffnungszeiten</h4>
                        <p>Mo - Fr: 09:00 - 16:00<br>
                        Sa: 10:00 - 13:00</p>
                    </div>

                    <div class="contact-form">
                        <h3>Nachricht senden</h3>
                        <form action="mailto:info@sv-ente.de" method="post" enctype="text/plain">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" required>

                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>

                            <label for="message">Nachricht</label>
                            <textarea id="message" name="message" rows="6" required></textarea>

                            <button type="submit" class="btn">Absenden</button>
                        </form>

                        
                    </div>
                </div>

                <div class="map-wrapper">
                    <h3>Unser Standort</h3>
                    <div class="osm-embed">
                        <iframe width="100%" height="350" frameborder="0" scrolling="no" marginheight="0" marginwidth="0"
                            src="https://www.openstreetmap.org/export/embed.html?bbox=10.1345%2C48.6721%2C10.1745%2C48.6921&layer=mapnik&marker=48.6821%2C10.1545"
                            aria-label="OpenStreetMap Karte von Heidenheim an der Brenz">
                        </iframe>
                    </div>
                </div>
            </section>
        </article>
    </main>
