    <main id="main-content">
        <div class="container">
            <section class="shop-header">
                <h1>Vereinsshop</h1>
                <p>Entdecken Sie unsere exklusiven Vereinsartikel, Merchandise und vieles mehr. 
                   Unterstützen Sie unseren Verein mit jedem Einkauf.</p>
            </section>
            <app-shop-filter-panel
                [filters]="filters()"
                [categoryOptions]="categoryOptions"
                [priceRangeOptions]="priceRangeOptions"
                [sizeOptions]="sizeOptions"
                (searchTermChanged)="onSearchTermChanged($event)"
                (categoryChanged)="onCategoryChanged($event)"
                (priceRangeChanged)="onPriceRangeChanged($event)"
                (sizeChanged)="onSizeChanged($event)"
                (resetClicked)="onResetFilters()"
            ></app-shop-filter-panel>

            <h2 class="visually-hidden">Unsere Produkte</h2>
            @if (isLoading()) {
                <div class="shop-loading" role="status" aria-live="polite">
                    <span class="loading" aria-hidden="true"></span>
                    <span>Produkte werden geladen...</span>
                </div>
            } @else {
                <app-shop-product-grid
                    [products]="filteredProducts()"
                    [showEmptyState]="hasActiveFilters()"
                    (addToCart)="onAddToCart($event)"
                ></app-shop-product-grid>
            }
        </div>
    </main>
