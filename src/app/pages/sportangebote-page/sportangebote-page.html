<main id="main-content" class="sportangebote-page">
  <section class="sportangebote-hero" aria-labelledby="sportangebote-title">
    <p>SV Ente Heidenheim</p>
    <h1 id="sportangebote-title">Unsere Sportangebote</h1>
    <span>Sechs Sportarten, ein Verein: Bewegung, Gemeinschaft und Spaß für jedes Niveau.</span>
  </section>

  <section class="sport-grid" aria-label="Alle Sportangebote">
    @for (sport of sports; track sport.id) {
      <article class="sport-card">
        <a [routerLink]="['/sportangebote', sport.id]" class="sport-card__image-link" [attr.aria-label]="sport.name + ' ansehen'">
          <img [src]="sport.heroImage" [alt]="sport.heroAlt">
        </a>
        <div class="sport-card__content">
          <p>Sportangebot</p>
          <h2><a [routerLink]="['/sportangebote', sport.id]">{{ sport.name }}</a></h2>
          <span>{{ sport.teaser }}</span>
          <a [routerLink]="['/sportangebote', sport.id]" class="sport-card__cta">Mehr erfahren</a>
        </div>
      </article>
    }
  </section>
</main>
